<style>
  :root{
    --bg:#F3F0E9; --card:#FFFFFF; --ink:#221F1A; --muted:#8B8579;
    --line:#E8E3D9; --accent:#2E6E5E; --accent-ink:#225244; --accent-soft:#E2EDE8;
    --danger:#BB4F38; --danger-soft:#F6E4DE; --shadow:0 8px 28px rgba(40,36,28,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'IBM Plex Sans KR',sans-serif; color:var(--ink);
    background:var(--bg);
    background-image:radial-gradient(120% 80% at 50% -10%, #FBF9F4 0%, var(--bg) 55%);
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea{font-family:inherit;font-size:16px;width:100%;}

  /* ---------- Gate ---------- */
  .gate{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px;text-align:center;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand .mark{width:52px;height:52px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .logo{font-size:40px;font-weight:700;letter-spacing:-1px;}
  .gate .tag{color:var(--muted);font-size:14px;margin:10px 0 34px;line-height:1.6;white-space:pre-line;}
  .field-wrap{width:100%;max-width:320px;text-align:left;margin-bottom:14px;}
  .field-wrap label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 6px 4px;font-weight:500;}
  .pwbox{position:relative;}
  .pwbox input{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:15px 46px 15px 16px;outline:none;transition:border-color .15s;}
  .pwbox input:focus{border-color:var(--accent);}
  .pwbox input:disabled{opacity:.5;}
  .pwbox .eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:10px;color:var(--muted);}
  .btn-primary{width:100%;max-width:320px;background:var(--accent);color:#fff;font-size:16px;font-weight:600;padding:16px;border-radius:14px;box-shadow:var(--shadow);transition:transform .08s,opacity .15s;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.55;}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin:4px 0 8px;font-weight:500;}
  .hint{color:var(--muted);font-size:12px;margin-top:18px;max-width:300px;line-height:1.6;}

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px;position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg) 75%, rgba(243,240,233,0));}
  header .logo{font-size:25px;}
  .hbtns{display:flex;gap:6px;}
  .iconbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--ink);background:var(--card);box-shadow:0 2px 8px rgba(40,36,28,.06);}
  .iconbtn:active{background:var(--line);}

  /* ---------- Tabs (top menu) ---------- */
  .tabs{display:flex;gap:6px;margin:8px 18px 2px;}
  .tab{flex:1;padding:12px 3px;border-radius:13px;font-size:13.5px;font-weight:600;color:var(--ink);background:var(--card);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;transition:.15s;}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 16px rgba(46,110,94,.28);}
  .tab .cnt{font-size:11px;font-weight:600;background:rgba(0,0,0,.06);padding:1px 7px;border-radius:99px;line-height:1.5;}
  .tab.active .cnt{background:rgba(255,255,255,.28);}
  .warn{margin:10px 18px 0;background:var(--danger-soft);color:var(--danger);font-size:12.5px;font-weight:500;line-height:1.5;padding:11px 14px;border-radius:12px;}

  /* ---------- Search ---------- */
  .searchbar{margin:14px 18px 4px;position:relative;}
  .searchbar input{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px 12px 40px;outline:none;font-size:14.5px;}
  .searchbar input:focus{border-color:var(--accent);}
  .searchbar .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}

  /* ---------- List ---------- */
  .list{flex:1;overflow-y:auto;padding:8px 18px 120px;}
  .card{background:var(--card);border-radius:16px;padding:15px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(40,36,28,.05);display:flex;align-items:center;gap:12px;transition:transform .08s;}
  .card:active{transform:scale(.985);}
  .avatar{width:42px;height:42px;border-radius:12px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
  .card .body{min-width:0;flex:1;}
  .card .t1{font-weight:600;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card .t2{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .chev{color:var(--line);flex-shrink:0;}
  .empty{text-align:center;color:var(--muted);padding:70px 24px;line-height:1.7;font-size:14px;}
  .empty .em-ic{opacity:.4;margin-bottom:14px;}

  /* ---------- FAB ---------- */
  .fab{position:fixed;bottom:26px;right:50%;transform:translateX(232px);width:58px;height:58px;border-radius:20px;background:var(--accent);color:#fff;box-shadow:0 10px 24px rgba(46,110,94,.4);display:flex;align-items:center;justify-content:center;z-index:8;transition:transform .1s;}
  .fab:active{transform:translateX(232px) scale(.92);}
  @media(max-width:520px){.fab{right:22px;transform:none;}.fab:active{transform:scale(.92);}}

  /* ---------- Sheet ---------- */
  .overlay{position:fixed;inset:0;background:rgba(34,31,26,.42);z-index:20;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);}
  .overlay.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--bg);border-radius:24px 24px 0 0;z-index:21;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.18);}
  .sheet.show{transform:translateY(0);}
  .grip{width:38px;height:4px;border-radius:99px;background:var(--line);margin:10px auto 4px;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 14px;gap:8px;}
  .sheet-head h3{margin:0;font-size:18px;font-weight:700;flex:1;}
  .sheet-head .back{margin-right:2px;}
  .sheet-body{overflow-y:auto;padding:0 18px 28px;}

  .frow{margin-bottom:14px;}
  .frow label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 6px 2px;font-weight:500;}
  .frow input,.frow textarea{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;outline:none;transition:border-color .15s;}
  .frow input:focus,.frow textarea:focus{border-color:var(--accent);}
  .frow textarea{resize:vertical;min-height:54px;line-height:1.5;}
  .frow.secret{position:relative;}
  .frow.secret input{padding-right:46px;}
  .frow .eye{position:absolute;right:6px;bottom:6px;padding:9px;color:var(--muted);}

  /* segmented + switch */
  .seg{display:flex;gap:4px;background:var(--card);border:1.5px solid var(--line);padding:4px;border-radius:12px;}
  .seg button{flex:1;padding:10px 4px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--muted);}
  .seg button.active{background:var(--accent-soft);color:var(--accent-ink);}
  .seg button:disabled{opacity:.4;}
  .switchrow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;}
  .switchrow span{font-size:14px;font-weight:500;}
  .switch{width:46px;height:27px;border-radius:99px;background:var(--line);position:relative;transition:.2s;flex-shrink:0;}
  .switch.on{background:var(--accent);}
  .switch::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .switch.on::after{left:22px;}

  /* detail */
  .drow{background:var(--card);border-radius:14px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:10px;}
  .drow .dlab{font-size:11.5px;color:var(--muted);font-weight:500;}
  .drow .dval{font-size:15px;margin-top:3px;word-break:break-all;line-height:1.45;}
  .drow .dval.masked{letter-spacing:2px;}
  .drow .dactions{display:flex;gap:2px;flex-shrink:0;}
  .drow .da{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .drow .da:active{background:var(--bg);}

  .btns{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;padding:15px;border-radius:13px;font-size:15px;font-weight:600;text-align:center;}
  .btn.save{background:var(--accent);color:#fff;}
  .btn.save:active{opacity:.85;}
  .btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);}
  .btn.del{background:var(--danger-soft);color:var(--danger);}
  .btn.del:active{opacity:.8;}

  .menu-item{display:flex;align-items:center;gap:13px;padding:15px 8px;font-size:15px;font-weight:500;border-bottom:1px solid var(--line);width:100%;text-align:left;}
  .menu-item:last-child{border-bottom:none;}
  .menu-item .mic{color:var(--accent);display:flex;}
  .menu-item .arr{margin-left:auto;color:var(--line);}
  .menu-item.danger{color:var(--danger);}
  .menu-item.danger .mic{color:var(--danger);}

  /* field manager */
  .fm-row{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:13px;padding:12px 14px;margin-bottom:9px;}
  .fm-name{font-size:15px;font-weight:600;}
  .fm-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .fm-acts{display:flex;gap:1px;flex-shrink:0;align-items:center;}
  .fm-acts .da{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .fm-acts .da:active{background:var(--bg);}
  .fm-acts .da:disabled{opacity:.25;}
  .badge{font-size:11px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);padding:4px 9px;border-radius:99px;}
  .addfield{width:100%;border:1.5px dashed var(--line);border-radius:13px;padding:14px;color:var(--accent);font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;}
  .chooser{display:flex;flex-direction:column;gap:9px;}
  .chooser button{background:var(--card);border-radius:13px;padding:16px;font-size:15.5px;font-weight:600;text-align:left;display:flex;align-items:center;justify-content:space-between;}
  .chooser .arr{color:var(--line);}

  /* dialog */
  .dlg-ov{position:fixed;inset:0;background:rgba(34,31,26,.5);z-index:40;opacity:0;pointer-events:none;transition:.2s;display:flex;align-items:center;justify-content:center;padding:30px;backdrop-filter:blur(2px);}
  .dlg-ov.show{opacity:1;pointer-events:auto;}
  .dialog{background:var(--bg);border-radius:22px;padding:26px 24px;max-width:330px;width:100%;text-align:center;box-shadow:var(--shadow);transform:scale(.94);transition:transform .2s;}
  .dlg-ov.show .dialog{transform:scale(1);}
  .dlg-ic{width:52px;height:52px;border-radius:16px;background:#FBF1DC;color:#C99A22;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .dlg-msg{font-size:16px;font-weight:600;line-height:1.55;}

  /* toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-size:13.5px;font-weight:500;z-index:60;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow);max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none!important;}
  .ver{font-size:11px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);padding:5px 9px;border-radius:99px;align-self:center;letter-spacing:.3px;}
  .ver-gate{position:absolute;top:16px;right:18px;font-size:11px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);padding:5px 10px;border-radius:99px;letter-spacing:.3px;z-index:3;}
</style>
</head>
<body>
<div id="app">

  <!-- Gate -->
  <div id="gate" class="gate">
    <span class="ver-gate">v6</span>
    <div class="brand">
      <div class="mark"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="4" y="10.5" width="16" height="10" rx="3" stroke="currentColor" stroke-width="2"/><path d="M7.5 10.5V8a4.5 4.5 0 0 1 9 0v2.5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="15" r="1.6" fill="currentColor"/></svg></div>
      <span class="logo">피키</span>
    </div>
    <div id="gateTag" class="tag"></div>
    <div class="field-wrap">
      <label id="lab1" for="pw1">비밀번호</label>
      <div class="pwbox"><input id="pw1" type="password" autocomplete="off" placeholder="••••••"><button class="eye" data-target="pw1" aria-label="표시"></button></div>
    </div>
    <div id="confirmWrap" class="field-wrap hidden">
      <label for="pw2">비밀번호 확인</label>
      <div class="pwbox"><input id="pw2" type="password" autocomplete="off" placeholder="••••••"><button class="eye" data-target="pw2" aria-label="표시"></button></div>
    </div>
    <div id="gateErr" class="err"></div>
    <button id="gateBtn" class="btn-primary">잠금 해제</button>
    <div id="gateHint" class="hint"></div>
  </div>

  <!-- Main -->
  <div id="main" class="hidden" style="flex:1;display:flex;flex-direction:column;min-height:100vh;">
    <header>
      <span class="logo">피키</span>
      <div class="hbtns">
        <span class="ver">v6</span>
        <button class="iconbtn" id="btnSettings" aria-label="설정"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2L14.2 3H9.8l-.4 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.5h4.4l.4-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
        <button class="iconbtn" id="btnLock" aria-label="잠그기"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="4" y="10.5" width="16" height="10" rx="3" stroke="currentColor" stroke-width="2"/><path d="M7.5 10.5V8a4.5 4.5 0 0 1 9 0v2.5" stroke="currentColor" stroke-width="2"/></svg></button>
      </div>
    </header>
    <div class="tabs" id="tabs"></div>
    <div id="storeWarn" class="warn hidden">⚠ 지금은 <b>미리보기</b> 상태라 자동 저장이 안 돼요. 파일을 폰에 저장해 <b>브라우저로 열고 홈 화면에 추가</b>하면 내용이 계속 유지됩니다. 그 전엔 <b>설정 → 백업하기</b>로 보관하세요.</div>
    <div class="searchbar"><span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span><input id="search" placeholder="검색" autocomplete="off"></div>
    <div class="list" id="list"></div>
    <button class="fab" id="fab" aria-label="추가"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></button>
  </div>

  <!-- Sheet -->
  <div class="overlay" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="sheet-head">
      <button class="iconbtn back hidden" id="sheetBack" style="width:34px;height:34px;box-shadow:none;background:var(--card);" aria-label="뒤로"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6 9 12l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h3 id="sheetTitle"></h3>
      <button class="iconbtn" id="sheetClose" style="width:34px;height:34px;box-shadow:none;background:var(--card);" aria-label="닫기"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <!-- Dialog -->
  <div class="dlg-ov" id="dlgOv">
    <div class="dialog">
      <div class="dlg-ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.5 10.9c.5.4.5 1 .5 1.6h6c0-.6 0-1.2.5-1.6A6 6 0 0 0 12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div id="dlgMsg" class="dlg-msg"></div>
      <button class="btn save" id="dlgOk" style="margin-top:18px;">확인</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

/* ===== Crypto ===== */
const enc=new TextEncoder(), dec=new TextDecoder();
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
const ub64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pw,salt){
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptObj(key,obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(JSON.stringify(obj)));
  const out=new Uint8Array(12+ct.byteLength); out.set(iv,0); out.set(new Uint8Array(ct),12);
  return b64(out);
}
async function decryptObj(key,str){
  const data=ub64(str); const iv=data.slice(0,12), ct=data.slice(12);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(dec.decode(pt));
}

/* ===== Storage (localStorage first → window.storage → memory) ===== */
const mem={};
let storageBroken=false;
const LS_OK=(function(){try{const t='__piki_test';localStorage.setItem(t,'1');localStorage.removeItem(t);return true;}catch(e){return false;}})();
const hasWS=typeof window!=='undefined'&&typeof window.storage!=='undefined'&&window.storage;
const wait=ms=>new Promise(r=>setTimeout(r,ms));
async function sGet(k){
  if(LS_OK){ try{ const v=localStorage.getItem(k); if(v!==null) return v; }catch(e){} }
  if(hasWS){ try{ const r=await window.storage.get(k,false); if(r&&r.value!==undefined&&r.value!==null) return r.value; }catch(e){} }
  return (k in mem)?mem[k]:null;
}
async function sSet(k,v){
  v=String(v); mem[k]=v; let ok=false;
  if(LS_OK){ try{ localStorage.setItem(k,v); ok=true; }catch(e){} }
  if(hasWS){ for(let i=0;i<3;i++){ try{ await window.storage.set(k,v,false); ok=true; break; }catch(e){ await wait(150); } } }
  if(!ok){ storageBroken=true; updateStorageWarn(); }
  return ok;
}
async function sDel(k){
  delete mem[k];
  if(LS_OK){ try{ localStorage.removeItem(k); }catch(e){} }
  if(hasWS){ try{ await window.storage.delete(k,false); }catch(e){} }
}
function updateStorageWarn(){ const w=document.getElementById('storeWarn'); if(w) w.classList.toggle('hidden',!storageBroken); }

(async function boot(){
  const salt=await sGet('piki.salt');

  if(isSetup){
    $('gateTag').textContent='나만의 안전한 기록장.\n사용할 비밀번호를 만들어 주세요.';

    $('gateTag').textContent='다시 만나서 반가워요.\n비밀번호를 입력해 주세요.';

})();

/* ===== Gate submit ===== */
$('gateBtn').onclick=submitGate;
$('pw1').addEventListener('keydown',e=>{if(e.key==='Enter'){isSetup?$('pw2').focus():submitGate();}});
$('pw2').addEventListener('keydown',e=>{if(e.key==='Enter')submitGate();});

async function submitGate(){
  if(locked)return;
  const pw=$('pw1').value; $('gateErr').textContent='';
  if(!pw){$('gateErr').textContent='비밀번호를 입력해 주세요.';return;}
  const btn=$('gateBtn'); btn.disabled=true;
  try{
    if(isSetup){
      if(pw.length<4){$('gateErr').textContent='4자 이상으로 만들어 주세요.';return;}
      if(pw!==$('pw2').value){$('gateErr').textContent='비밀번호가 일치하지 않아요.';return;}
      const salt=crypto.getRandomValues(new Uint8Array(16));
      KEY=await deriveKey(pw,salt);
      VAULT={schema:defaultSchema(),address:[],password:[],person:[]};
      await sSet('piki.salt',b64(salt));
      await sSet('piki.hint',DEFAULT_HINT); HINT=DEFAULT_HINT;
      await sSet('piki.vault',await encryptObj(KEY,VAULT));
      attempts=0; openMain();
    }else{
      try{
        const salt=ub64(await sGet('piki.salt'));
        const k=await deriveKey(pw,salt);
        const v=await decryptObj(k,await sGet('piki.vault'));
        KEY=k; VAULT=v; if(!VAULT.schema)VAULT.schema=defaultSchema();
        ['address','password','person'].forEach(c=>{if(!Array.isArray(VAULT[c]))VAULT[c]=[];});
        attempts=0; openMain();
      }catch(err){ attempts++; handleFail(); }
    }
  }catch(e){ $('gateErr').textContent='문제가 발생했어요.'; }
  finally{ if(!locked) btn.disabled=false; }
}
function handleFail(){
  $('pw1').value='';
  if(attempts>=5){ startLockout(); return; }
  $('gateErr').textContent='비밀번호가 올바르지 않아요. (남은 시도 '+(5-attempts)+'회)';
  if(attempts===2) showDialog(HINT);
}

/* ===== Tabs ===== */
function buildTabs(){
  const t=$('tabs'); if(!t)return;

    html+='<button class="tab'+(c===CUR?' active':'')+'" data-cat="'+c+'"><span>'+CATS[c].label+'</span><span class="cnt">'+cnt+'</span></button>';
  });

/* ===== List ===== */
$('search').addEventListener('input',render);
function render(){
  const q=$('search').value.trim().toLowerCase();
  const items=VAULT[CUR].filter(i=>!q||Object.values(i).some(v=>String(v||'').toLowerCase().includes(q)));
  const list=$('list'); list.innerHTML='';
  if(!items.length){
    list.innerHTML='<div class="empty"><div class="em-ic"><svg width="46" height="46" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></div>'+(q?'검색 결과가 없어요.':'아직 기록이 없어요.<br>아래 + 버튼으로 추가해 보세요.')+'</div>';
    return;
  }
  const pf=VAULT.schema[CUR][0];
  items.forEach(it=>{
    const prim=it[pf.id]||'(제목 없음)';
    const sec=secondary(CUR,it);
    const card=document.createElement('div'); card.className='card';
    card.innerHTML='<div class="avatar">'+escapeHtml(initial(prim))+'</div><div class="body"><div class="t1">'+escapeHtml(prim)+'</div>'+(sec?'<div class="t2">'+escapeHtml(sec)+'</div>':'')+'</div><span class="chev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    card.onclick=()=>openDetail(it);
    list.appendChild(card);
  });
}
function secondary(cat,item){
  const f=VAULT.schema[cat]; const out=[];
  for(let i=1;i<f.length;i++){ if(f[i].type==='secret'||f[i].id==='memo')continue; const v=item[f[i].id]; if(v){out.push(v); if(out.length>=2)break;} }
  return out.join(' · ');
}
const initial=s=>(s||'?').trim().charAt(0).toUpperCase();
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

    else if(f.type==='secret') html+='<div class="frow secret"><label>'+escapeHtml(f.label)+req+'</label><input id="'+iid+'" type="password" class="mono" value="'+v+'" autocomplete="off"><button class="eye" type="button" data-ft="'+iid+'">'+eyeSvg(false)+'</button></div>';
    else html+='<div class="frow"><label>'+escapeHtml(f.label)+req+'</label><input id="'+iid+'" type="text" value="'+v+'" autocomplete="off"></div>';
  });
  html+='<div class="err" id="fErr"></div><div class="btns"><button class="btn save" id="fSave">저장</button></div>';
  openSheet(existing?'편집':CATS[CUR].label+' 추가', html);

    else{ obj.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6); VAULT[CUR].unshift(obj); toast('추가했어요'); }
    persist(); closeSheet(); buildTabs(); render();
  };
}

}

/* ===== Field editing ===== */
function typeLabel(t){return t==='secret'?'비밀번호':t==='textarea'?'긴 글':'일반';}
function openFieldPick(){
  let html='<div class="chooser">';
  ORDER.forEach(c=>{ html+='<button data-c="'+c+'">'+CATS[c].label+'<span class="arr"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>'; });
  html+='</div><div class="hint" style="margin-top:16px;">편집할 영역을 선택하세요. 각 영역의 입력 항목을 추가·이름변경·순서변경·삭제할 수 있어요.</div>';
  openSheet('항목(필드) 편집', html, openSettings);
  $('sheetBody').querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>openFieldMgr(b.dataset.c));
}
function openFieldMgr(cat){
  const fs=VAULT.schema[cat]; let html='';
  fs.forEach((f,i)=>{
    const up=i>1, down=i>=1&&i<fs.length-1;
    html+='<div class="fm-row"><div style="flex:1;min-width:0;"><div class="fm-name">'+escapeHtml(f.label)+'</div><div class="fm-meta">'+(f.primary?'대표 항목 · 목록 제목':typeLabel(f.type)+(f.copy&&f.type!=='secret'?' · 복사 가능':''))+'</div></div><div class="fm-acts">'
      +'<button class="da" data-edit="'+i+'"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M14 5.5 18.5 10M4 20l1-4L16 5a2 2 0 0 1 3 3L8 19l-4 1Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></button>'
      +(f.primary?'<span class="badge">대표</span>':'<button class="da" data-up="'+i+'" '+(up?'':'disabled')+'><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="m6 14 6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="da" data-down="'+i+'" '+(down?'':'disabled')+'><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="m6 10 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="da" data-del="'+i+'" style="color:var(--danger)"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-8 0 1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>')
      +'</div></div>';
  });
  html+='<button class="addfield" id="fAdd"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>새 항목 추가</button>';
  openSheet(CATS[cat].label+' 항목', html, openFieldPick);
  const re=()=>openFieldMgr(cat);
  $('sheetBody').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openFieldEditor(cat,+b.dataset.edit));
  $('sheetBody').querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{const i=+b.dataset.up;swap(cat,i,i-1);re();});
  $('sheetBody').querySelectorAll('[data-down]').forEach(b=>b.onclick=()=>{const i=+b.dataset.down;swap(cat,i,i+1);re();});
  $('sheetBody').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.del, f=VAULT.schema[cat][i];
    if(!confirm('"'+f.label+'" 항목을 삭제할까요?\n이 항목에 저장된 내용도 함께 사라져요.'))return;
    VAULT[cat].forEach(it=>{delete it[f.id];});
    VAULT.schema[cat].splice(i,1); persist(); render(); re(); toast('항목을 삭제했어요');
  });
  $('fAdd').onclick=()=>openFieldEditor(cat,null);
}
function swap(cat,a,b){const s=VAULT.schema[cat];[s[a],s[b]]=[s[b],s[a]];persist();render();}
function openFieldEditor(cat,idx){
  const isNew=idx===null;
  const f=isNew?{id:'fld_'+Date.now().toString(36),label:'',type:'text',copy:false}:JSON.parse(JSON.stringify(VAULT.schema[cat][idx]));
  const primary=!!f.primary;
  let html='<div class="frow"><label>항목 이름 *</label><input id="flabel" type="text" value="'+escapeHtml(f.label)+'" placeholder="예: 기억할 사람" autocomplete="off"></div>';
  if(!primary){
    html+='<div class="frow"><label>유형</label><div class="seg" id="fseg">'
      +'<button data-t="text" class="'+(f.type==='text'?'active':'')+'">일반</button>'
      +'<button data-t="textarea" class="'+(f.type==='textarea'?'active':'')+'">긴 글</button>'
      +'<button data-t="secret" class="'+(f.type==='secret'?'active':'')+'">비밀번호</button></div></div>';
    html+='<div class="frow" id="copyRow"><div class="switchrow"><span>복사 버튼 표시</span><button class="switch '+(f.copy?'on':'')+'" id="fcopy"></button></div></div>';
  }else{
    html+='<div class="hint" style="margin:2px 0 4px;">대표 항목이에요. 이름만 바꿀 수 있고, 목록에 제목으로 표시돼요.</div>';
  }
  html+='<div class="err" id="feErr"></div><div class="btns"><button class="btn save" id="feSave">저장</button>'+(!isNew&&!primary?'<button class="btn del" id="feDel">삭제</button>':'')+'</div>';
  openSheet(isNew?'새 항목':'항목 편집', html, ()=>openFieldMgr(cat));
  let type=f.type, copy=!!f.copy;
  const syncCopy=()=>{ $('copyRow') && ($('copyRow').style.display = type==='secret'?'none':''); };
  if(!primary){
    syncCopy();
    $('fseg').querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{type=b.dataset.t;$('fseg').querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));syncCopy();});
    $('fcopy').onclick=()=>{copy=!copy;$('fcopy').classList.toggle('on',copy);};
  }
  $('feSave').onclick=()=>{
    const label=$('flabel').value.trim();
    if(!label){$('feErr').textContent='항목 이름을 입력해 주세요.';return;}
    const nf={id:f.id,label:label,type:primary?'text':type}; if(primary)nf.primary=true;
    if(!primary&&type!=='secret'&&copy)nf.copy=true;
    if(isNew)VAULT.schema[cat].push(nf); else VAULT.schema[cat][idx]=nf;
    persist(); render(); openFieldMgr(cat); toast(isNew?'항목을 추가했어요':'항목을 저장했어요');
  };
  if(!isNew&&!primary)$('feDel').onclick=()=>{
    if(!confirm('"'+f.label+'" 항목을 삭제할까요?\n저장된 내용도 함께 사라져요.'))return;
    VAULT[cat].forEach(it=>{delete it[f.id];});
    VAULT.schema[cat].splice(idx,1); persist(); render(); openFieldMgr(cat); toast('항목을 삭제했어요');
  };
}

function changePw(){
  const html='<div class="frow secret"><label>새 비밀번호</label><input id="np1" type="password" class="mono" autocomplete="off"><button class="eye" type="button" data-ft="np1">'+eyeSvg(false)+'</button></div>'
   +'<div class="frow secret"><label>새 비밀번호 확인</label><input id="np2" type="password" class="mono" autocomplete="off"><button class="eye" type="button" data-ft="np2">'+eyeSvg(false)+'</button></div>'
   +'<div class="err" id="npErr"></div><div class="btns"><button class="btn save" id="npSave">변경하기</button></div>';
  openSheet('비밀번호 변경', html, openSettings);
  $('sheetBody').querySelectorAll('[data-ft]').forEach(b=>b.onclick=()=>{const t=$(b.dataset.ft);const s=t.type==='password';t.type=s?'text':'password';b.innerHTML=eyeSvg(s);});
  $('npSave').onclick=async()=>{
    const a=$('np1').value,b=$('np2').value;
    if(a.length<4){$('npErr').textContent='4자 이상으로 만들어 주세요.';return;}
    if(a!==b){$('npErr').textContent='비밀번호가 일치하지 않아요.';return;}
    const salt=crypto.getRandomValues(new Uint8Array(16));
    KEY=await deriveKey(a,salt); await sSet('piki.salt',b64(salt)); await persist();
    closeSheet(); toast('비밀번호를 변경했어요');
  };
}

/* ===== Backup (share -> Google Drive) ===== */
async function exportBackup(){
  const json=JSON.stringify({app:'piki',version:2,exported:new Date().toISOString(),data:VAULT},null,2);
  const fname='piki-backup-'+new Date().toISOString().slice(0,10)+'.json';
  try{
    const file=new File([json],fname,{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'피키 백업'});
      toast('공유 메뉴에서 Google Drive를 선택해 저장하세요');
      return;
    }
  }catch(e){ if(e&&e.name==='AbortError')return; }
  // fallback: download
  const blob=new Blob([json],{type:'application/json'}), url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('백업 파일을 저장했어요');
}
function importBackup(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{ const file=inp.files[0]; if(!file)return; const r=new FileReader();
    r.onload=async()=>{ try{
        const p=JSON.parse(r.result), d=p.data||p;
        if(!d.address||!d.password||!d.person)throw 0;
        if(!confirm('현재 기록을 백업 내용으로 덮어쓸까요?'))return;
        VAULT={schema:d.schema||defaultSchema(),address:d.address||[],password:d.password||[],person:d.person||[]};
        await persist(); closeSheet(); buildTabs(); render(); toast('백업을 가져왔어요');
      }catch(e){ alert('올바른 피키 백업 파일이 아니에요.'); } };
    r.readAsText(file); };
  inp.click();
}
async function wipeAll(){
  if(!confirm('모든 기록과 비밀번호가 삭제됩니다. 정말 초기화할까요?'))return;
  if(!confirm('이 작업은 되돌릴 수 없어요. 계속할까요?'))return;
  await sDel('piki.salt'); await sDel('piki.vault'); await sDel('piki.hint');
  KEY=null;VAULT=null; location.reload();
}
